<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Rajashree! ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        /* Dark, elegant theme */
        body { background-color: #080808; color: #ffffff; overflow: hidden; font-family: sans-serif; }
        
        /* Heart Snowflake effect */
        .snowflake { position: fixed; top: -10vh; z-index: 0; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* The Polaroid Frame for the Video */
        .photo-frame {
            background: white; padding: 12px 12px 45px 12px; border-radius: 4px;
            box-shadow: 0 15px 45px rgba(209, 179, 255, 0.4);
            max-width: 340px; width: 100%; transition: transform 0.3s ease;
            position: relative; z-index: 10;
        }
        .photo-frame video { width: 100%; height: auto; border-radius: 2px; }
        .caption { color: #333; text-align: center; font-style: italic; margin-top: 15px; font-weight: bold; font-size: 1.1rem; }
        
        .btn-purple { background: linear-gradient(135deg, #a855f7 0%, #D1B3FF 100%); color: #000; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <iframe id="youtubePlayer" width="0" height="0" src="https://www.youtube.com/embed/QJO3ROT-A4E?enablejsapi=1" frameborder="0" allow="autoplay"></iframe>

    <div class="z-10 text-center max-w-lg">
        <h1 class="text-4xl font-bold mb-8 animate__animated animate__fadeInDown" style="color: #D1B3FF;">
            Happy Birthday Rajashree!
        </h1>

        <div class="photo-frame mx-auto animate__animated animate__zoomIn">
            <video autoplay muted loop playsinline class="w-full">
                <source src="1778037251143.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <p class="caption">A moment with you 💜</p>
        </div>

        <p class="mt-8 text-gray-400 italic text-lg px-4 animate__animated animate__fadeIn">
            "Watching you grow... you don't know you're beautiful, but everyone else does."
        </p>
        
        <button onclick="startCelebration()" id="mainBtn" class="mt-8 btn-purple px-10 py-4 rounded-full font-bold shadow-xl active:scale-95 transition-all text-lg">
            Tap for your surprise 🎁
        </button>

        <div id="extraMessage" class="hidden mt-8 animate__animated animate__fadeIn">
            <p class="text-xl font-bold" style="color: #D1B3FF;">Enjoy your special day! ✨</p>
            <div class="mt-4 text-4xl">🎂 🎉 🎈</div>
        </div>
    </div>

    <script>
        function startCelebration() {
            // 1. Play the music
            const player = document.getElementById('youtubePlayer');
            player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');

            // 2. Show the message
            document.getElementById('extraMessage').classList.remove('hidden');
            document.getElementById('mainBtn').innerHTML = "Enjoy the music! 🎵";
            document.getElementById('mainBtn').style.opacity = "0.6";
        }

        // Heart Snowflake Logic
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = Math.random() > 0.5 ? '🤍' : '💜';
            heart.className = 'snowflake';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 150);
    </script>
</body>
</html>
