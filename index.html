<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Demo ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        /* Black background and falling hearts */
        body { background-color: #080808; color: #ffffff; overflow-x: hidden; font-family: sans-serif; }
        
        .snowflake { position: fixed; top: -10vh; z-index: 0; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* The Photo Frame */
        .photo-frame {
            background: white; padding: 15px 15px 45px 15px; border-radius: 4px;
            box-shadow: 0 15px 35px rgba(209, 179, 255, 0.3);
            max-width: 320px; width: 100%; transition: transform 0.3s ease;
        }
        .photo-frame:hover { transform: scale(1.02); }
        .photo-frame img { width: 100%; height: auto; border-radius: 2px; }
        .caption { color: #333; text-align: center; font-style: italic; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <iframe id="youtubePlayer" width="0" height="0" src="https://www.youtube.com/embed/QJO3ROT-A4E?enablejsapi=1" frameborder="0" allow="autoplay"></iframe>

    <div class="z-10 text-center max-w-lg">
        <h1 class="text-4xl font-bold mb-6 animate__animated animate__fadeInDown" style="color: #D1B3FF;">
            Happy Birthday Rajashree!
        </h1>

        <div class="photo-frame mx-auto animate__animated animate__zoomIn">
            <img src="photo.jpg" onerror="this.src='https://via.placeholder.com/300x400/D1B3FF/333333?text=Your+Photo+Here'">
            <p class="caption">A special memory 💜</p>
        </div>

        <p class="mt-8 text-gray-400 italic">"What Makes You Beautiful" is playing for you...</p>
        
        <button onclick="startMusic()" class="mt-6 bg-indigo-600 text-white px-8 py-3 rounded-full font-bold shadow-lg active:scale-95 transition">
            Tap to Start Music 🎵
        </button>
    </div>

    <script>
        function startMusic() {
            const player = document.getElementById('youtubePlayer');
            // This tells the YouTube video to start
            player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            alert("Happy Birthday! Music is now playing.");
        }

        // Snowflake Heart Logic
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = Math.random() > 0.5 ? '🤍' : '💜';
            heart.className = 'snowflake';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 200); // Creates a heart every 200ms
    </script>
</body>
</html>
