<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rajashree ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background-color: #080808; color: #ffffff; overflow-x: hidden; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Polaroid Styling: Keeps media from becoming a background */
        .polaroid {
            background: #ffffff;
            padding: 10px 10px 40px 10px;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(209, 179, 255, 0.3);
            width: 90%;
            max-width: 320px;
            margin: 40px auto;
            position: relative;
            z-index: 10;
        }

        .polaroid video, .polaroid img { 
            width: 100%; 
            height: auto; 
            display: block; 
            object-fit: contain; 
            background: #000;
        }

        .pol-cap { color: #333; text-align: center; font-family: 'Georgia', serif; font-style: italic; margin-top: 15px; font-size: 0.9rem; font-weight: bold; }

        /* Blur Reveal for Phase 3 */
        .blur-reveal { filter: blur(35px); transition: filter 2.5s ease-in-out; }
        .clear-now { filter: blur(0px) !important; }

        /* Falling Snow Style */
        .falling-photo {
            position: fixed; top: -25vh; z-index: 100; pointer-events: none;
            animation: fallDown linear forwards;
            width: 120px; padding: 5px 5px 20px 5px; background: #fff;
        }
        @keyframes fallDown { to { transform: translateY(125vh) rotate(360deg); } }

        #audio-container { position: absolute; width: 0; height: 0; overflow: hidden; }
    </style>
</head>
<body class="text-center">

    <div id="audio-container"></div>
    <audio id="reveal-audio" src="abhi-maza-ayagga.mp3"></audio>

    <div id="timeline" class="p-6 animate__animated animate__fadeIn">
        <h1 class="text-3xl font-bold mb-10 mt-6" style="color: #D1B3FF;">Our Story ❤️</h1>

        <div class="polaroid" style="transform: rotate(-2deg);">
            <video id="v1" controls playsinline>
                <source src="1778037251143.mp4" type="video/mp4">
            </video>
            <p class="pol-cap">Bevdi, Don, Pillu... ❤️</p>
        </div>

        <div class="polaroid" style="transform: rotate(3deg);">
            <video id="v2" controls playsinline>
                <source src="VID-20260124-WA0003(1).mp4" type="video/mp4">
            </video>
            <p class="pol-cap">Moments with You 💜</p>
        </div>

        <div class="mt-12 mb-20">
            <button onclick="startFinalPhase()" id="revealBtn" class="bg-gradient-to-r from-purple-500 to-indigo-400 text-black px-10 py-4 rounded-full font-bold shadow-2xl active:scale-95 text-lg">
                Tap for the Surprise ☁️ ✨
            </button>
        </div>
    </div>

    <div id="phase3" class="hidden min-h-screen flex flex-col items-center justify-center">
        <div class="polaroid blur-reveal" id="bevdiFrame">
            <img src="bevdi" id="bevdiImg">
            <p class="pol-cap" id="revealText">Wait for it...</p>
        </div>
    </div>

    <script>
        const photos = ['crybaby', 'don', 'aaji', 'haircut-1', 'haircut-2', 'holi-2-1', 'kurta-1', 'kurta-2', 'menhdi', 'red shirt', 'red shirt-2', 'traditional', 'trek', 'wedding', 'Holi grp', 'Holi-4'];

        // Start 1D Music when she starts the first video
        document.getElementById('v1').onplay = () => {
            const container = document.getElementById('audio-container');
            if(container.innerHTML === "") {
                container.innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/QJO3ROT-A4E?autoplay=1" frameborder="0" allow="autoplay"></iframe>';
            }
        };

        function startFinalPhase() {
            // 1. Start the "Snowing" photos
            setInterval(() => {
                const imgName = photos[Math.floor(Math.random() * photos.length)];
                createFallingPhoto(imgName);
            }, 800);

            // 2. Show Phase 3
            document.getElementById('phase3').classList.remove('hidden');
            document.getElementById('phase3').scrollIntoView({ behavior: 'smooth' });

            // 3. Countdown for Blur Reveal and Abhi Maza Aayega
            setTimeout(() => {
                // Clear the 1D music
                document.getElementById('audio-container').innerHTML = "";
                
                // Clear Blur
                document.getElementById('bevdiFrame').classList.add('clear-now');
                document.getElementById('revealText').innerHTML = "ABHI MAZA AAYEGA! 😈🔥";
                
                // Play final audio
                document.getElementById('reveal-audio').play();
            }, 3500); 
        }

        function createFallingPhoto(src) {
            const container = document.createElement('div');
            container.className = 'falling-photo';
            container.style.left = Math.random() * 80 + 'vw';
            container.style.animationDuration = (Math.random() * 3 + 4) + 's';
            container.innerHTML = `<img src="${src}" style="width:100%"><p class="pol-cap" style="font-size:0.5rem">Pillu 💜</p>`;
            document.body.appendChild(container);
            setTimeout(() => container.remove(), 7000);
        }
    </script>
</body>
</html>
