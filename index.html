<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rajashree ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background-color: #080808; color: #ffffff; overflow-x: hidden; font-family: sans-serif; margin: 0; padding-bottom: 50px; scroll-behavior: smooth; }
        
        /* 1. LOCK SCREEN & LETTER */
        #lockOverlay, #startOverlay, #finalWishScreen, #feedbackScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        #lockOverlay { background: #080808; }
        /* Vintage Letter background uses original colors to maintain parchment effect */
        #startOverlay { background: radial-gradient(circle, #e2c08d 0%, #c19a6b 100%); box-shadow: inset 0 0 100px rgba(0,0,0,0.5); overflow-y: auto; z-index: 2500; }
        
        .lock-input { background: #1a1a1a; border: 2px solid #D1B3FF; color: white; padding: 15px; border-radius: 10px; text-align: center; outline: none; }
        .timer-box { font-family: monospace; font-size: 2.5rem; color: #ff4d4d; margin-top: 20px; letter-spacing: 2px; }
        .falling-heart { position: absolute; color: #D1B3FF; font-size: 20px; z-index: 2999; animation: fallHeart linear forwards; }
        @keyframes fallHeart { to { transform: translateY(110vh) rotate(360deg); } }

        /* 2. TYPEWRITER & TEXT */
        #typewriterText { font-family: 'Georgia', serif; font-style: italic; font-size: 1.3rem; line-height: 1.7; color: #3d2b1f; max-width: 600px; }
        #finalWishText { font-family: 'Georgia', serif; font-style: italic; color: #D1B3FF; font-size: 2rem; }
        .word { opacity: 0; display: inline-block; margin-right: 5px; transition: opacity 0.4s ease; }
        .word.visible { opacity: 1; }

        /* 3. MAIN SITE ELEMENTS */
        .polaroid { background: #ffffff; padding: 10px 10px 30px 10px; border-radius: 2px; box-shadow: 0 10px 30px rgba(209, 179, 255, 0.3); width: 280px; margin: 20px auto; }
        .polaroid video, .polaroid img { width: 100%; height: auto; max-height: 400px; object-fit: contain; background: #000; display: block; }
        .pol-cap { color: #333; text-align: center; font-style: italic; margin-top: 10px; font-weight: bold; }
        .video-strip { display: flex; overflow-x: auto; gap: 15px; padding: 20px; justify-content: flex-start; scroll-snap-type: x mandatory; }
        @media (min-width: 600px) { .video-strip { justify-content: center; } }
        
        /* 4. FINALE SCREENS */
        #finalWishScreen { background: #080808; z-index: 4000; display: none; }
        #feedbackScreen { background: #0f0f0f; z-index: 5000; display: none; }
        .record-btn { background: #ff4d4d; width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 20px auto; }
        .record-btn.recording { animation: pulse 1s infinite; background: #fff; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="lockOverlay">
        <h2 class="text-2xl mb-6 text-purple-300">Enter the Secret Code 🔐</h2>
        <input type="text" id="passInput" class="lock-input mb-4" placeholder="Password">
        <button onclick="checkPass()" class="bg-purple-600 text-white px-10 py-3 rounded-full font-bold">Unlock</button>
        <div class="timer-box" id="timer">00:00:00</div>
        <p id="countdownMsg" class="text-gray-500 mt-2">Waiting for May 9th...</p>
    </div>

    <div id="startOverlay" class="hidden">
        <h1 id="bdayHeader" class="text-3xl font-bold mb-6 mt-4" style="color: #3d2b1f;">Wait for it... ⏳</h1>
        <div id="typewriterText"></div>
        <button id="giftBtn" onclick="startMainSite()" class="hidden bg-stone-800 text-amber-50 px-10 py-4 rounded-full mt-6">Open My Gift 🎁</button>
    </div>

    <div id="audio-storage"></div>
    <audio id="reveal-audio" src="abhi-maza-ayagga (mp3cut.net).mp3"></audio>

    <div id="mainContent" class="hidden">
        <div id="act1" class="p-6">
            <h1 class="text-3xl font-bold mb-4">Our Story ❤️</h1>
            <div class="video-strip">
                <div class="polaroid"><video id="v1" loop muted playsinline><source src="1778037251143.mp4"></video></div>
                <div class="polaroid"><video id="v2" loop muted playsinline><source src="VID-20260124-WA0003(1).mp4"></video></div>
                <div class="polaroid"><video id="v3" loop muted playsinline><source src="doc_2026-05-06_13-28-43.mp4"></video></div>
            </div>
            <button onclick="unlockTimeline()" class="bg-purple-600 px-8 py-3 rounded-full mt-4">See Timeline ↓</button>
        </div>

        <div id="act2" class="hidden p-6">
             <div class="nickname-label text-purple-300 text-2xl mt-8">Evolution 🍼</div>
             <div class="polaroid"><img src="crybaby"><p class="pol-cap">Baby Pillu</p></div>
             <div class="polaroid"><img src="aaji"><p class="pol-cap">With Aaji</p></div>
             <div class="polaroid"><img src="wedding"><p class="pol-cap">Now ❤️</p></div>
             <button onclick="startFinalSurprise()" class="bg-gradient-to-r from-purple-500 to-indigo-400 text-black px-12 py-5 rounded-full mt-10 font-bold">THE FINAL SURPRISE ✨</button>
        </div>

        <div id="act3" class="hidden min-h-screen flex items-center justify-center">
            <div class="polaroid blur-reveal" id="bevdiFrame"><img src="bevdi"><p class="pol-cap" id="statusText">Wait...</p></div>
        </div>
    </div>

    <div id="finalWishScreen">
        <div id="finalWishText"></div>
    </div>

    <div id="feedbackScreen">
        <h2 class="text-2xl text-purple-300 mb-4">Thoughts on the Gift? ❤️</h2>
        <p class="text-gray-400 mb-8">Record a voice note for Indraneel</p>
        <div id="recordBtn" class="record-btn">🎙️</div>
        <p id="recordStatus" class="text-sm">Tap to Record</p>
        <div id="playbackBox" class="hidden mt-6">
            <audio id="voicePlayback" controls class="mx-auto"></audio>
            <a id="downloadVoice" class="block mt-4 text-purple-400 underline">Download & Send to him 🚀</a>
        </div>
    </div>

    <script>
        const letterMsg = "I first saw you during our 10th grade, and since then, I have had a crush on you. We had our verbal abuse competitions several times, and the second time, you were the clear winner. I was quite dumb, even when you tried to contact me through Telegram. I should have understood the obvious signs and the subtle hints you dropped—like keeping good profile pictures, which I did save, just in case I ever found the courage to propose. But I never did. You know, destiny works in beautiful ways. You were the one who proposed to me; you were the one who caught the hint I dropped: 'You are blunt... Tu tondavar bolte sagla.' Then you practiced for a month just to propose to me on the very first day of the year—01/01/2026. This was the best New Year present for me—starting the year with the very person I love. I know I messed up quite a lot, but you understood my dumb behavior and forgave me so many times. I have hurt you, but it was never intentional, and it never will be. All I ever want is for you to be happy. Happy Birthday, BonBon / Pillu (Rajashree). I love you so much, my darling.";
        const wishMsg = "I love you BonBon. Wishing you a very happy Birthday! ❤️";
        const allPhotos = ['crybaby', 'don', 'aaji', 'haircut-1', 'haircut-2', 'holi-2-1', 'kurta-1', 'kurta-2', 'menhdi', 'red shirt', 'red shirt-2', 'red shirt-3', 'red shirt-4', 'traditional', 'trek', 'wedding', 'Holi grp', 'Holi-4', 'IMG-20260123-WA0038(3).jpg', 'IMG-20260123-WA0039.jpg', 'IMG-20260123-WA0047.jpg', 'IMG-20260124-WA0007(1).jpg'];
        
        let isBirthdayTime = false; // Set to true for tester
        const targetDate = new Date("May 9, 2026 00:00:00").getTime();

        // TIMER & LOCK
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) {
                isBirthdayTime = true;
                document.getElementById('timer').innerText = "00:00:00";
            } else {
                const hrs = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').innerText = `${hrs}:${mins}:${secs}`;
            }
        }, 1000);

        function checkPass() {
            if(document.getElementById('passInput').value === "BonBon") {
                document.getElementById('lockOverlay').style.display = 'none';
                document.getElementById('startOverlay').style.display = 'flex';
                typeWriter(letterMsg, 'typewriterText', 'giftBtn');
            }
        }

        function typeWriter(text, targetId, btnId) {
            const container = document.getElementById(targetId);
            const words = text.split(" ");
            words.forEach((word, i) => {
                const span = document.createElement('span');
                span.innerText = word; span.className = 'word';
                container.appendChild(span);
                setTimeout(() => {
                    span.classList.add('visible');
                    if (i === words.length - 1 && btnId) document.getElementById(btnId).classList.remove('hidden');
                }, i * 200);
            });
        }

        function startMainSite() {
            document.getElementById('startOverlay').style.display = 'none';
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('audio-storage').innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/QJO3ROT-A4E?autoplay=1&loop=1&playlist=QJO3ROT-A4E" frameborder="0" allow="autoplay"></iframe>';
            document.getElementById('v1').play(); document.getElementById('v2').play(); document.getElementById('v3').play();
        }

        function unlockTimeline() {
            document.getElementById('act2').classList.remove('hidden');
            document.getElementById('act2').scrollIntoView({ behavior: 'smooth' });
        }

        function startFinalSurprise() {
            document.getElementById('act3').classList.remove('hidden');
            document.getElementById('act3').scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => {
                document.getElementById('audio-storage').innerHTML = ""; 
                document.getElementById('reveal-audio').play(); 
                document.getElementById('bevdiFrame').classList.add('clear-now');
                setTimeout(() => { startPhotoSnow(); }, 3000);
            }, 3500); 
        }

        function startPhotoSnow() {
            const snowInt = setInterval(() => {
                const img = allPhotos[Math.floor(Math.random() * allPhotos.length)];
                const el = document.createElement('div');
                el.className = 'falling-photo polaroid fixed top-0';
                el.style.left = Math.random() * 80 + 'vw';
                el.style.animation = "fallDown 5s linear forwards";
                el.innerHTML = `<img src="${img}">`;
                document.body.appendChild(el);
            }, 800);

            // END SEQUENCE: Transition after 15 seconds
            setTimeout(() => {
                clearInterval(snowInt);
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('finalWishScreen').style.display = 'flex';
                typeWriter(wishMsg, 'finalWishText');
                
                // Switch to Feedback Screen (Approx 10s)
                setTimeout(() => {
                    document.getElementById('finalWishScreen').style.display = 'none';
                    document.getElementById('feedbackScreen').style.display = 'flex';
                }, 10000);
            }, 15000);
        }

        // Voice Recorder logic... (keep from previous version)
    </script>
</body>
</html>
