<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rajashree ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background-color: #080808; color: #ffffff; overflow-x: hidden; font-family: sans-serif; margin: 0; padding-bottom: 150px; scroll-behavior: smooth; }
        
        .polaroid {
            background: #ffffff; padding: 10px 10px 40px 10px; border-radius: 2px;
            box-shadow: 0 10px 30px rgba(209, 179, 255, 0.3); width: 90%;
            max-width: 320px; margin: 40px auto; display: block;
        }

        .polaroid video, .polaroid img { width: 100%; height: auto; max-height: 450px; display: block; object-fit: contain; background: #000; }
        .pol-cap { color: #333; text-align: center; font-family: 'Georgia', serif; font-style: italic; margin-top: 15px; font-size: 0.9rem; font-weight: bold; }

        /* Falling Snow/Photo Style */
        .falling-photo {
            position: fixed; top: -25vh; z-index: 100; animation: fallDown linear forwards;
            width: 110px; padding: 5px; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); cursor: pointer;
        }
        @keyframes fallDown { to { transform: translateY(125vh) rotate(360deg); } }

        #photoViewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }

        /* Blur Reveal Phase 3 */
        .blur-reveal { filter: blur(35px); transition: filter 2.5s ease-in-out; }
        .clear-now { filter: blur(0px) !important; }

        #audio-storage { position: absolute; width: 0; height: 0; overflow: hidden; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="text-center">

    <div id="audio-storage"></div>
    <audio id="reveal-audio" src="abhi-maza-ayagga.mp3"></audio>

    <div id="videoTimeline" class="p-6 animate__animated animate__fadeIn">
        <h1 class="text-3xl font-bold mb-10 mt-6" style="color: #D1B3FF;">Our Story ❤️</h1>

        <div class="polaroid" style="transform: rotate(-2deg);">
            <video id="v1" controls playsinline><source src="1778037251143.mp4" type="video/mp4"></video>
            <p class="pol-cap">Bevdi, Don, Pillu... ❤️</p>
        </div>

        <div class="polaroid" style="transform: rotate(3deg);">
            <video id="v2" controls playsinline><source src="VID-20260124-WA0003(1).mp4" type="video/mp4"></video>
            <p class="pol-cap">Moments with You 💜</p>
        </div>

        <div class="polaroid" style="transform: rotate(-1deg);">
            <video id="v3" controls playsinline><source src="doc_2026-05-06_13-28-43.mp4" type="video/mp4"></video>
            <p class="pol-cap">Forever to go 💜</p>
        </div>

        <div class="mt-16 mb-20">
            <button onclick="startEvolution()" class="bg-gradient-to-r from-purple-500 to-indigo-400 text-black px-12 py-5 rounded-full font-bold shadow-2xl active:scale-95 text-xl">
                Tap for the Evolution ☁️ ✨
            </button>
        </div>
    </div>

    <div id="evolutionTimeline" class="hidden-section p-6">
        <h2 class="text-2xl font-bold mb-8" style="color: #D1B3FF;">Growing Up... ✨</h2>
        
        <div class="polaroid" style="transform: rotate(1deg);"><img src="crybaby"><p class="pol-cap">Where it started (Infant) 🍼</p></div>
        <div class="polaroid" style="transform: rotate(-2deg);"><img src="aaji"><p class="pol-cap">With Aaji ❤️</p></div>
        <div class="polaroid" style="transform: rotate(2deg);"><img src="haircut-1"><p class="pol-cap">The Haircut Days 💇‍♀️</p></div>
        <div class="polaroid" style="transform: rotate(-1deg);"><img src="traditional"><p class="pol-cap">Growing into Grace 🌸</p></div>
        <div class="polaroid" style="transform: rotate(3deg);"><img src="trek"><p class="pol-cap">The Adventurous Soul ⛰️</p></div>
        <div class="polaroid" style="transform: rotate(-2deg);"><img src="Holi-4"><p class="pol-cap">Colorful as ever 🌈</p></div>

        <div class="mt-20 mb-40">
            <button onclick="finalMaza()" class="bg-white text-black px-10 py-4 rounded-full font-bold shadow-lg">
                The Final Reveal 😈
            </button>
        </div>
    </div>

    <div id="phase3" class="hidden-section min-h-screen flex flex-col items-center justify-center p-6">
        <div class="polaroid blur-reveal" id="bevdiFrame">
            <img src="bevdi" id="finalImg">
            <p class="pol-cap" id="statusText">Wait for it...</p>
        </div>
    </div>

    <div id="photoViewer" onclick="this.style.display='none'">
        <div class="polaroid" style="max-width: 90vw; width: auto; transform: rotate(0deg);"><img id="bigImg" src=""><p class="pol-cap">Tap to close</p></div>
    </div>

    <script>
        const photoList = ['crybaby', 'don', 'aaji', 'haircut-1', 'haircut-2', 'holi-2-1', 'kurta-1', 'kurta-2', 'menhdi', 'red shirt', 'red shirt-2', 'traditional', 'trek', 'wedding', 'Holi grp', 'Holi-4'];

        document.getElementById('v1').onplay = () => {
            const container = document.getElementById('audio-storage');
            if(container.innerHTML === "") {
                container.innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/QJO3ROT-A4E?autoplay=1" frameborder="0" allow="autoplay"></iframe>';
            }
        };

        function startEvolution() {
            // Start Snowing Photos
            setInterval(() => {
                const img = photoList[Math.floor(Math.random() * photoList.length)];
                dropPhoto(img);
            }, 800);

            // Show Act 2
            document.getElementById('evolutionTimeline').style.display = 'block';
            document.getElementById('evolutionTimeline').scrollIntoView({ behavior: 'smooth' });
        }

        function finalMaza() {
            // Show Phase 3
            document.getElementById('phase3').style.display = 'flex';
            document.getElementById('phase3').scrollIntoView({ behavior: 'smooth' });

            // The Abhi Maza Aayega Reveal
            setTimeout(() => {
                document.getElementById('audio-storage').innerHTML = ""; // Stop 1D
                document.getElementById('bevdiFrame').classList.add('clear-now');
                document.getElementById('statusText').innerHTML = "ABHI MAZA AAYEGA! 😈🔥";
                document.getElementById('reveal-audio').play();
            }, 3500);
        }

        function dropPhoto(src) {
            const el = document.createElement('div');
            el.className = 'falling-photo polaroid';
            el.style.left = Math.random() * 80 + 'vw';
            el.style.animationDuration = (Math.random() * 2 + 4) + 's';
            el.onclick = (e) => {
                e.stopPropagation();
                document.getElementById('bigImg').src = src;
                document.getElementById('photoViewer').style.display = 'flex';
            };
            el.innerHTML = `<img src="${src}"><p class="pol-cap" style="font-size:0.5rem">Pillu 💜</p>`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 7000);
        }
    </script>
</body>
</html>
