<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Rajashree! ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        .heart { position: fixed; color: #ff4d6d; font-size: 20px; z-index: -1; animation: float 3s linear infinite; }
        @keyframes float { from { transform: translateY(100vh); opacity: 1; } to { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body class="bg-rose-50 text-gray-800 font-sans">

    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="animate__animated animate__zoomIn bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border-t-8 border-rose-400">
            <h1 class="text-4xl font-bold text-rose-600 mb-2">Happy Birthday!</h1>
            <h2 class="text-2xl font-semibold text-gray-700 mb-6">Rajashree ❤️</h2>
            
            <p class="text-lg text-gray-600 leading-relaxed mb-8">
                "To the person who makes every day better. May your birthday be as beautiful and special as you are!"
            </p>

            <button onclick="celebrate()" class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-10 rounded-full shadow-lg transition transform active:scale-95">
                Tap for a Surprise 🎁
            </button>

            <div id="extra-message" class="hidden mt-8 animate__animated animate__fadeInUp">
                <p class="text-rose-700 font-medium italic">"I'm so lucky to have you. Here's to many more memories together!"</p>
                <div class="mt-4 text-3xl">🎂 ✨ 🎈</div>
            </div>
        </div>
    </div>

    <script>
        function celebrate() {
            document.getElementById('extra-message').classList.remove('hidden');
            // Create floating hearts
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '❤️';
                    heart.className = 'heart';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 5000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
